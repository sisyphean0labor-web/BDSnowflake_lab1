version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bds_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bds_lab
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./csv_data:/csv_data